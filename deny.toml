[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "all"
ignore = []

[licenses]
unused-allowed-license = "allow"
confidence-threshold = 0.8
allow = [
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0"
]

[bans]
multiple-versions = "warn"
deny = []
skip = [
    { crate = "getrandom@0.2.17", reason = "Required via rand_core 0.6 / ed25519-dalek and ring/rustls trees in current dependency set" },
    { crate = "getrandom@0.4.2", reason = "Required transitively by tempfile in current dependency set" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
