name: Security Scanning (SCA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00

permissions:
  contents: read
  security-events: write

jobs:
  cargo-deny:
    name: Dependency Audit & License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo-deny check
        run: |
          cargo-deny --format sarif check advisories licenses bans sources > cargo-deny.sarif.tmp || true
          # Fix invalid SARIF: snippet and message in region must be objects, but cargo-deny provides strings or nulls
          # We simply remove them to satisfy validation as they are optional.
          jq 'del(.runs[].results[].locations[].physicalLocation.region.snippet) | del(.runs[].results[].locations[].physicalLocation.region.message)' cargo-deny.sarif.tmp > cargo-deny.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cargo-deny.sarif
          category: cargo-deny
