name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: never
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Privileged Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Privileged Test Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tests/Dockerfile
          load: true
          tags: secure-sudoers-test:latest
          pull: true
          provenance: false
          cache-from: type=gha,scope=privileged-tests
          cache-to: type=gha,mode=max,scope=privileged-tests
      - name: Run Privileged Tests
        run: |
          docker run --rm --privileged -v ${{ github.workspace }}:/output secure-sudoers-test:latest \
            bash -c "/workspace/tests/run_privileged_tests.sh && cp /workspace/cobertura.xml /output/"
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage
          path: cobertura.xml
