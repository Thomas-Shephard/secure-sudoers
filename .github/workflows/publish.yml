name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            apt_pkgs: ""
            linker: ""
            bin_suffix: x86_64-linux
            use_zigbuild: false
            make_deb: true
          - target: x86_64-unknown-linux-musl
            apt_pkgs: musl-tools
            linker: musl-gcc
            bin_suffix: x86_64-linux-musl
            use_zigbuild: false
            make_deb: false
          - target: aarch64-unknown-linux-gnu
            apt_pkgs: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            bin_suffix: aarch64-linux
            use_zigbuild: false
            make_deb: false
          - target: aarch64-unknown-linux-musl
            apt_pkgs: ""
            linker: ""
            bin_suffix: aarch64-linux-musl
            use_zigbuild: true
            make_deb: false

    steps:
      - uses: actions/checkout@v6
      - name: Set version from tag
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" crates/*/Cargo.toml
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system packages
        if: matrix.apt_pkgs != ''
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.apt_pkgs }}
      - name: Set up swap space
        run: |
          SWAPFILE=/swapfile
          if [ -f "$SWAPFILE" ]; then
            sudo swapoff "$SWAPFILE" || true
          fi
          sudo fallocate -l 4G "$SWAPFILE"
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h
      - name: Install Zig
        if: matrix.use_zigbuild
        uses: goto-bus-stop/setup-zig@v2
      - name: Cache Cargo and Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cache/zig
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-${{ matrix.target }}-
      - name: Configure cross-linker
        if: matrix.linker != ''
        run: |
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
          echo "CC_${TARGET_UPPER}=${{ matrix.linker }}" >> "$GITHUB_ENV"
      - name: Build (cargo)
        if: "!matrix.use_zigbuild"
        run: |
          cargo build -p secure-sudoers --release --target ${{ matrix.target }} --verbose
          cargo build -p secure-sudoers-utils --release --features network-update --target ${{ matrix.target }} --verbose
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
      - name: Build (cargo-zigbuild)
        if: matrix.use_zigbuild
        run: |
          cargo install cargo-zigbuild --locked
          cargo zigbuild -p secure-sudoers --release --target ${{ matrix.target }} --verbose
          cargo zigbuild -p secure-sudoers-utils --release --features network-update --target ${{ matrix.target }} --verbose
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
      - name: Stage binaries
        run: |
          mkdir -p dist
          BIN_DIR="target/${{ matrix.target }}/release"
          cp "${BIN_DIR}/secure-sudoers" "dist/secure-sudoers-${{ matrix.bin_suffix }}"
          cp "${BIN_DIR}/secure-sudoers-utils" "dist/secure-sudoers-utils-${{ matrix.bin_suffix }}"
      - name: Build .deb package
        if: matrix.make_deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p secure-sudoers --target ${{ matrix.target }} --no-build
          cp target/${{ matrix.target }}/debian/*.deb dist/
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * | tee SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
