name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            bin_suffix: x86_64-linux
            use_zigbuild: false
          - target: x86_64-unknown-linux-musl
            bin_suffix: x86_64-linux-musl
            use_zigbuild: true
          - target: aarch64-unknown-linux-gnu
            bin_suffix: aarch64-linux
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            bin_suffix: aarch64-linux-musl
            use_zigbuild: true
    steps:
      - uses: actions/checkout@v6
      - name: Set version from tag
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" crates/*/Cargo.toml
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
#      - name: Set up swap space
#        run: |
#          SWAPFILE=/swapfile
#          if [ -f "$SWAPFILE" ]; then
#            sudo swapoff "$SWAPFILE" || true
#          fi
#          sudo fallocate -l 8G "$SWAPFILE"
#          sudo chmod 600 "$SWAPFILE"
#          sudo mkswap "$SWAPFILE"
#          sudo swapon "$SWAPFILE"
#          free -h
      - name: Install Zig
        if: matrix.use_zigbuild
        uses: goto-bus-stop/setup-zig@v2
      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: pip install --user cargo-zigbuild
      - name: Cache Cargo and Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cache/zig
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-${{ matrix.target }}-
      - name: Build (cargo)
        if: "!matrix.use_zigbuild"
        run: |
          cargo build -p secure-sudoers --release --target ${{ matrix.target }} --verbose
          cargo build -p secure-sudoers-utils --release --features network-update --target ${{ matrix.target }} --verbose
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
      - name: Build (cargo-zigbuild)
        if: matrix.use_zigbuild
        run: |
          cargo zigbuild -p secure-sudoers --release --target ${{ matrix.target }} --verbose
          cargo zigbuild -p secure-sudoers-utils --release --features network-update --target ${{ matrix.target }} --verbose
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
      - name: Stage binaries
        run: |
          mkdir -p dist
          BIN_DIR="target/${{ matrix.target }}/release"
          cp "${BIN_DIR}/secure-sudoers" "dist/secure-sudoers-${{ matrix.bin_suffix }}"
          cp "${BIN_DIR}/secure-sudoers-utils" "dist/secure-sudoers-utils-${{ matrix.bin_suffix }}"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
